<html lang="en">
  <head>
    <title>Face Enrollment | Biometric Secure</title>
    <style>
      }

      body {
        margin: 0;
        display: flex;
        justify-content: center;
        overflow: hidden;
      }

        background: white;
        position: relative;
      }

      .header {
        text-align: center;
      }

      .title {
        font-weight: 700;
      }

      .subtitle {
        text-transform: uppercase;
      }

      .viewfinder {
        position: relative;
        width: 100%;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      .overlay {
        position: absolute;
        pointer-events: none;
        box-sizing: border-box;
      }

      .corner {
        position: absolute;
      }

      .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        top: 0;
          opacity: 0.5;
        }
      }

        text-align: center;
      }

      }

      .progress-container {
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
      }

      .message {
        text-align: center;
        align-items: center;
        }

    </style>
  </head>
  <body>
      <div class="card">
        <div class="header">
          <h1 class="title">Face Enrollment</h1>
        </div>

          <div class="viewfinder">
            <video id="video" autoplay playsinline></video>
            <div class="overlay"></div>
            <div class="scan-line"></div>
            <div class="corner top-l"></div>
            <div class="corner top-r"></div>
            <div class="corner bot-l"></div>
            <div class="corner bot-r"></div>
        </div>

          <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
          </div>
          <div class="message" id="msg"></div>
        </div>
        </div>


    <script>
      const csrfToken = "{{ csrf_token }}";
      const challenges = {{ challenges|safe }};

      let video = document.getElementById("video");
      let canvas = document.getElementById("canvas");
      let ctx = canvas.getContext("2d");
      let statusText = document.getElementById("status");
      let bar = document.getElementById("bar");
      let msg = document.getElementById("msg");

      let step = 0;
      let capturing = false;
      let stableCount = 0;
      let lastCheck = 0;

              video.srcObject = stream;
                  startAutoCheck();

      function startAutoCheck() {
          setInterval(() => {
              lastCheck = Date.now();
              ctx.drawImage(video, 0, 0, 320, 240);

              fetch("/accounts/face/check/", {
                  method: "POST",
                  body: JSON.stringify({ frame: frame })
              })
              .then(r => r.json())
              .then(d => {
                  if (d.face) {
                      stableCount++;
                  } else {
                      stableCount = 0;
                  }
              });
      }

      async function startCapture() {
          if (capturing) return;
          capturing = true;
          let challenge = challenges[step];
          statusText.innerText = challenge.text;
          msg.innerText = challenge.instruction;

          let frames = [];

          for (let i = 0; i < totalFrames; i++) {
              bar.style.width = ((i + 1) / totalFrames) * 100 + "%";
              ctx.drawImage(video, 0, 0, 320, 240);
          }
          sendFrames(frames, challenge.type);
      }

      function sendFrames(frames, type) {
          fetch(window.location.href, {
              method: "POST",
              body: JSON.stringify({ frames: frames, challenge: type, step: step })
          })
          .then(r => r.json())
          .then(d => {
              capturing = false;
              bar.style.width = "0%";
              if (d.success) {
                  if (d.can_verify) {
                      fetch(window.location.pathname.replace('/capture/', '/verify/'), {
                          method: "POST",
                          headers: { "X-CSRFToken": csrfToken }
                      })
                      .then(r => r.json())
                      .then(vd => {
                          if (vd.success && vd.completed) {
                          } else {
                              stableCount = 0;
                          }
                      })
                      .catch(() => {
                      });
                  } else {
                      step = d.next_step;
                      statusText.innerText = d.next_challenge.text;
                      msg.innerText = d.next_challenge.instruction;
                  }
              } else {
                  msg.innerText = d.error;
                  stableCount = 0;
              }
          })
          .catch(() => {
              capturing = false;
          });
      }
    </script>
  </body>
</html>
